# Пример локального override для docker-compose.
# Скопируй этот файл в docker-compose.override.yml (без .example)
# и Docker Compose автоматически подхватит его при запуске.
#
# Зачем нужен этот override:
#  - build: .        — собирать образ из исходников (чтобы применялись локальные правки,
#                      например русская локаль), а не тянуть готовый image от автора.
#  - image: ...      — фиксированное имя локального образа.
#  - network_mode: host — использовать сеть хоста. Нужно из-за проблем с DNS
#                          в дефолтной Docker-сети на некоторых серверах.
#  - ports: !reset [] — сбросить проброс портов из основного docker-compose.yml
#                       (в режиме host он не нужен).
#
# Доступ к веб-интерфейсу снаружи закрывается файрволом (UFW), а ты ходишь
# к http://localhost:3000 через SSH-туннель.

services:
  mirofish:
    build: .
    image: mirofish-local
    network_mode: host
    ports: !reset []
